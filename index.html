<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#F4F0E7" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="A field journal for strength & nourishment" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="hyPer" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('hyper-theme');
          // FOLIO opens on Paper (light); an explicit stored choice still wins.
          var theme = stored === 'light' || stored === 'dark' ? stored : 'light';
          document.documentElement.classList.remove('dark', 'light');
          document.documentElement.classList.add(theme);
          document.documentElement.style.colorScheme = theme;
          var themeColorMeta = document.querySelector('meta[name="theme-color"]');
          if (themeColorMeta) {
            themeColorMeta.setAttribute('content', theme === 'light' ? '#F4F0E7' : '#14110C');
          }
        } catch (_error) {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,400;1,9..144,500&family=Geist:wght@300..600&family=Geist+Mono:wght@400..500&display=swap" rel="stylesheet">
    <title>hyPer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
